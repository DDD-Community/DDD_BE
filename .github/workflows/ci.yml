name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: test_db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint:check

      - name: Unit test
        run: yarn test --runInBand --passWithNoTests

      - name: E2E test
        run: yarn test:e2e --runInBand --passWithNoTests

      - name: Build
        run: yarn build

      - name: Set image name
        id: image
        run: |
          OWNER="${{ github.repository_owner }}"
          echo "tag=ghcr.io/${OWNER,,}/ddd-be:ci" >> "$GITHUB_OUTPUT"
          echo "latest=ghcr.io/${OWNER,,}/ddd-be:latest" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build check
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.image.outputs.tag }}
          cache-from: type=registry,ref=${{ steps.image.outputs.latest }}
